name: Send Monday Prayer Email

on:
  schedule:
    # Every day at 6:00 AM Pacific (13:00 UTC, PDT = UTC-7)
    - cron: "0 13 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  send-email:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send prayer request email
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ORG_NAME: ${{ secrets.ORG_NAME }}
          ORG_TAGLINE: ${{ secrets.ORG_TAGLINE }}
          ORG_WEBSITE: ${{ secrets.ORG_WEBSITE }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          SUBSCRIBE_FORM_URL: ${{ secrets.SUBSCRIBE_FORM_URL }}
        run: python scripts/prayer_requests.py send-email

      - name: Commit updated state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update prayer request state [skip ci]"
          file_pattern: scripts/last_state.json
