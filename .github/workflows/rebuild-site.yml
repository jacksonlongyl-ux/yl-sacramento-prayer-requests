name: Rebuild Prayer Requests Site

on:
  schedule:
    # Rebuild every hour so the site stays current with new sheet submissions
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/prayer_requests.py build-site

      - name: Commit built site
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild prayer requests site [skip ci]"
          file_pattern: docs/index.html
